<!DOCTYPE html>
<html lang="en">

<head>
  <title>Travel — Zhaomin Xiao</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <script defer src="assets/fontawesome/js/all.min.js"></script>
  <link rel="stylesheet" href="assets/css/apple.css">
  <link rel="icon" type="image/svg+xml" href="img/favicon.svg">
  <script src="https://unpkg.com/globe.gl@2.32.0/dist/globe.gl.min.js"></script>
  <style>
    .travel-page {
      min-height: 100vh;
      background: #0a0a1a;
      position: relative;
      overflow: hidden;
    }

    .travel-nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(10, 10, 26, 0.6);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    .travel-nav a {
      color: rgba(255,255,255,0.7);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 500;
      font-family: 'Inter', sans-serif;
      transition: color 0.3s;
    }

    .travel-nav a:hover {
      color: #fff;
    }

    .travel-title {
      color: #fff;
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    #globeContainer {
      width: 100%;
      height: 100vh;
    }

    .travel-tooltip {
      background: rgba(20, 20, 40, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 12px;
      padding: 12px;
      max-width: 240px;
      font-family: 'Inter', sans-serif;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    }

    .travel-tooltip img {
      width: 100%;
      height: 120px;
      object-fit: cover;
      border-radius: 8px;
      margin-bottom: 8px;
    }

    .travel-tooltip h4 {
      color: #fff;
      font-size: 0.9rem;
      font-weight: 700;
      margin: 0 0 4px 0;
    }

    .travel-tooltip p {
      color: rgba(255,255,255,0.6);
      font-size: 0.75rem;
      margin: 0;
      line-height: 1.4;
    }

    .travel-marker {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #e17055;
      border: 2px solid rgba(255,255,255,0.8);
      box-shadow: 0 0 12px rgba(225, 112, 85, 0.6);
      cursor: pointer;
      transition: transform 0.2s;
    }

    .travel-marker:hover {
      transform: scale(1.4);
    }

    .travel-instructions {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.4);
      font-family: 'Inter', sans-serif;
      font-size: 0.78rem;
      text-align: center;
      pointer-events: none;
      z-index: 10;
    }

    .travel-legend {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: rgba(255,255,255,0.5);
      font-family: 'Inter', sans-serif;
      font-size: 0.72rem;
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #e17055;
      box-shadow: 0 0 8px rgba(225, 112, 85, 0.5);
    }
  </style>
</head>

<body class="travel-page">

  <div class="travel-nav">
    <a href="index.html"><i class="fas fa-arrow-left"></i> <span class="lang-en">Back</span><span class="lang-zh">返回</span></a>
    <span class="travel-title"><span class="lang-en">My Travels</span><span class="lang-zh">我的旅行</span></span>
    <div></div>
  </div>

  <div id="globeContainer"></div>

  <div class="travel-instructions">
    <span class="lang-en">Drag to rotate · Scroll to zoom · Hover markers for details</span>
    <span class="lang-zh">拖动旋转 · 滚轮缩放 · 悬停标记查看详情</span>
  </div>

  <div class="travel-legend">
    <div class="legend-item">
      <div class="legend-dot"></div>
      <span class="lang-en">Places I've been</span><span class="lang-zh">去过的地方</span>
    </div>
  </div>

  <script>
    // Apply saved preferences
    if (localStorage.getItem('darkMode') === 'true') document.body.classList.add('dark-mode');
    if (localStorage.getItem('lang') === 'zh') {
      document.body.classList.add('zh');
      document.documentElement.lang = 'zh';
    }

    const isZh = document.body.classList.contains('zh');

    // Travel destinations — add your own photos to img/travel/ and update paths here
    const places = [
      {
        name: isZh ? '纽约' : 'New York',
        lat: 40.7128, lng: -74.0060,
        desc: isZh ? '大苹果城，不夜之城' : 'The Big Apple, the city that never sleeps',
        img: ''
      },
      {
        name: isZh ? '旧金山' : 'San Francisco',
        lat: 37.7749, lng: -122.4194,
        desc: isZh ? '金门大桥与科技之城' : 'Golden Gate Bridge and tech capital',
        img: ''
      },
      {
        name: isZh ? '丹顿' : 'Denton, TX',
        lat: 33.2148, lng: -97.1331,
        desc: isZh ? '大学生活的地方' : 'Where university life happened',
        img: ''
      },
      {
        name: isZh ? '匹兹堡' : 'Pittsburgh',
        lat: 40.4406, lng: -79.9959,
        desc: isZh ? '钢铁之城，硕士求学之地' : 'Steel City, where I got my master\'s',
        img: ''
      },
      {
        name: isZh ? '深圳' : 'Shenzhen',
        lat: 22.5431, lng: 114.0579,
        desc: isZh ? '家乡，本科求学之地' : 'Home, where I did my undergrad',
        img: ''
      },
      {
        name: isZh ? '洛杉矶' : 'Los Angeles',
        lat: 34.0522, lng: -118.2437,
        desc: isZh ? '天使之城' : 'City of Angels',
        img: ''
      }
    ];

    // Build the globe
    const globe = Globe()
      .globeImageUrl('https://unpkg.com/three-globe@2.32.0/example/img/earth-blue-marble.jpg')
      .bumpImageUrl('https://unpkg.com/three-globe@2.32.0/example/img/earth-topology.png')
      .backgroundImageUrl('https://unpkg.com/three-globe@2.32.0/example/img/night-sky.png')
      .showAtmosphere(true)
      .atmosphereColor('#6366f1')
      .atmosphereAltitude(0.2)
      .pointsData(places)
      .pointLat('lat')
      .pointLng('lng')
      .pointColor(() => '#e17055')
      .pointAltitude(0.02)
      .pointRadius(0.4)
      .pointsMerge(false)
      .labelsData(places)
      .labelLat('lat')
      .labelLng('lng')
      .labelText('name')
      .labelSize(1.2)
      .labelDotRadius(0.4)
      .labelColor(() => 'rgba(255, 255, 255, 0.85)')
      .labelResolution(2)
      .labelAltitude(0.025)
      .htmlElementsData(places)
      .htmlLat('lat')
      .htmlLng('lng')
      .htmlAltitude(0.03)
      .htmlElement(d => {
        const el = document.createElement('div');
        el.className = 'travel-marker';
        el.title = d.name;

        el.addEventListener('mouseenter', () => {
          const existing = document.querySelector('.travel-tooltip');
          if (existing) existing.remove();

          const tooltip = document.createElement('div');
          tooltip.className = 'travel-tooltip';
          let html = '';
          if (d.img) {
            html += `<img src="${d.img}" alt="${d.name}">`;
          }
          html += `<h4>${d.name}</h4>`;
          html += `<p>${d.desc}</p>`;
          tooltip.innerHTML = html;

          tooltip.style.position = 'fixed';
          const rect = el.getBoundingClientRect();
          tooltip.style.left = (rect.left + rect.width / 2 - 120) + 'px';
          tooltip.style.top = (rect.top - 180) + 'px';
          tooltip.style.zIndex = '200';
          document.body.appendChild(tooltip);
        });

        el.addEventListener('mouseleave', () => {
          const existing = document.querySelector('.travel-tooltip');
          if (existing) existing.remove();
        });

        return el;
      })
      (document.getElementById('globeContainer'));

    // Auto-rotate
    globe.controls().autoRotate = true;
    globe.controls().autoRotateSpeed = 0.5;
    globe.controls().enableDamping = true;

    // Responsive
    window.addEventListener('resize', () => {
      globe.width(window.innerWidth);
      globe.height(window.innerHeight);
    });
  </script>

</body>
</html>
