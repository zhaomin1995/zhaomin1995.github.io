<!DOCTYPE html>
<html lang="en">

<head>
  <title>History — Zhaomin Xiao</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <script defer src="assets/fontawesome/js/all.min.js"></script>
  <link rel="icon" type="image/svg+xml" href="img/favicon.svg">
  <script src="assets/js/events.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #fafafa; --text: #1d1d1f; --text-sec: #86868b;
      --accent: #e17055; --card-bg: #ffffff; --card-shadow: rgba(0,0,0,0.12);
      --dot-ring: rgba(225,112,85,0.25);
    }
    body.dark-mode {
      --bg: #0a0a12; --text: #f0f0f5; --text-sec: #8e8e9a;
      --card-bg: #1c1c24; --card-shadow: rgba(0,0,0,0.5);
      --dot-ring: rgba(225,112,85,0.3);
    }
    body {
      font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text);
      -webkit-font-smoothing: antialiased; overflow: hidden; height: 100vh;
    }
    .lang-zh { display: none; }
    body.zh .lang-en { display: none; }
    body.zh .lang-zh { display: inline; }
    canvas { display: block; cursor: grab; }
    canvas:active { cursor: grabbing; }

    .h-nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      padding: 0 1.5rem; height: 48px; display: flex; align-items: center; justify-content: space-between;
      background: rgba(250,250,250,0.75); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    }
    body.dark-mode .h-nav { background: rgba(10,10,18,0.8); }
    .h-nav a, .h-nav span { color: var(--text-sec); text-decoration: none; font-size: 0.82rem; font-weight: 500; transition: color 0.3s; }
    .h-nav a:hover { color: var(--text); }
    .h-nav-title { font-family: 'Playfair Display', serif; font-size: 1rem; font-weight: 700; color: var(--text); }

    .zoom-hint {
      position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); z-index: 50;
      background: var(--card-bg); color: var(--text-sec); font-size: 0.72rem; font-weight: 500;
      padding: 0.5em 1.2em; border-radius: 20px; box-shadow: 0 2px 12px var(--card-shadow);
      pointer-events: none; opacity: 0.8;
    }

    .zoom-controls {
      position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 50;
      display: flex; flex-direction: column; gap: 0.4rem;
    }
    .zoom-btn {
      width: 36px; height: 36px; border-radius: 50%; border: none; cursor: pointer;
      background: var(--card-bg); color: var(--text); font-size: 1.1rem; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 10px var(--card-shadow); transition: background 0.2s, transform 0.2s;
    }
    .zoom-btn:hover { background: var(--accent); color: #fff; transform: scale(1.1); }

    .event-tooltip {
      position: fixed; z-index: 200; background: var(--card-bg); border-radius: 14px;
      padding: 1.1rem 1.3rem; max-width: 320px; box-shadow: 0 12px 40px var(--card-shadow);
      pointer-events: none; opacity: 0; transform: translateY(8px);
      transition: opacity 0.15s ease, transform 0.15s ease;
      border: 1px solid rgba(0,0,0,0.05);
    }
    body.dark-mode .event-tooltip { border-color: rgba(255,255,255,0.06); }
    .event-tooltip.show { opacity: 1; transform: translateY(0); }
    .event-tooltip .tt-year { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--accent); background: var(--dot-ring); padding: 0.15em 0.6em; border-radius: 20px; display: inline-block; margin-bottom: 0.4rem; }
    .event-tooltip .tt-title { font-size: 0.95rem; font-weight: 700; color: var(--text); margin-bottom: 0.25rem; line-height: 1.3; }
    .event-tooltip .tt-desc { font-size: 0.8rem; color: var(--text-sec); line-height: 1.55; margin: 0; }
    .event-tooltip .tt-era { font-size: 0.65rem; color: var(--text-sec); margin-top: 0.4rem; font-style: italic; }
  </style>
</head>

<body>
  <nav class="h-nav">
    <a href="index.html"><i class="fas fa-arrow-left"></i> <span class="lang-en">Back</span><span class="lang-zh">返回</span></a>
    <span class="h-nav-title"><span class="lang-en">5,000 Years of History</span><span class="lang-zh">五千年历史</span></span>
    <span id="eventCount" style="font-size:0.72rem;"></span>
  </nav>

  <canvas id="c"></canvas>

  <div class="zoom-hint">
    <span class="lang-en">Scroll to zoom · Drag to pan · Hover markers for details</span>
    <span class="lang-zh">滚轮缩放 · 拖动平移 · 悬停标记查看详情</span>
  </div>

  <div class="zoom-controls">
    <button class="zoom-btn" id="zoomIn">+</button>
    <button class="zoom-btn" id="zoomOut">−</button>
    <button class="zoom-btn" id="zoomReset" style="font-size:0.7rem;">⟲</button>
  </div>

  <div class="event-tooltip" id="tooltip"></div>

  <script>
    if (localStorage.getItem('darkMode') === 'true') document.body.classList.add('dark-mode');
    if (localStorage.getItem('lang') === 'zh') { document.body.classList.add('zh'); document.documentElement.lang = 'zh'; }
    const isZh = document.body.classList.contains('zh');
    const isDark = document.body.classList.contains('dark-mode');

    // Importance ranks
    const landmark = new Set([-3000,-2560,-221,-44,30,105,476,610,800,1066,1206,1215,1347,1440,1453,1492,1517,1543,1687,1760,1776,1789,1859,1903,1914,1917,1939,1945,1949,1969,1989,1991,2001,2020,2022]);
    const major = new Set([-3500,-3200,-3100,-2600,-1792,-776,-551,-508,-336,-206,-100,-49,79,117,312,330,570,618,622,632,711,732,750,793,868,960,1000,1054,1095,1187,1258,1271,1325,1368,1405,1521,1588,1609,1620,1644,1648,1689,1796,1804,1815,1837,1861,1865,1868,1876,1879,1905,1911,1918,1928,1929,1933,1941,1947,1948,1953,1957,1962,1978,1986,1994,2007,2008,2016,2023]);
    EVENTS.forEach(e => { e.rank = landmark.has(e.year) ? 1 : major.has(e.year) ? 2 : 3; });
    EVENTS.sort((a, b) => a.year - b.year);

    // Era color palette
    const eraColors = {
      'early-civ': '#f4a261', 'classical': '#e76f51', 'early-medieval': '#e17055',
      'high-medieval': '#d63384', 'late-medieval': '#9b59b6', 'renaissance': '#6f42c1',
      'enlightenment': '#4361ee', 'industrial': '#0d6efd', 'early-20c': '#20c997',
      'cold-war': '#2ecc71', 'info-age': '#06d6a0'
    };

    // Canvas
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const tooltip = document.getElementById('tooltip');
    const DPR = window.devicePixelRatio || 1;
    let W, H;
    function resizeCanvas() {
      W = window.innerWidth; H = window.innerHeight;
      canvas.width = W * DPR; canvas.height = H * DPR;
      canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    }
    resizeCanvas();

    let zoom = 1, panX = 0, panY = 0;
    let dragging = false, dragStartX, dragStartY, dragPanX, dragPanY;
    let dotPositions = [], hoveredIdx = -1;
    let particles = [];
    let animFrame;

    function getVisibleEvents() {
      if (zoom < 0.6) return EVENTS.filter(e => e.rank === 1);
      if (zoom < 1.2) return EVENTS.filter(e => e.rank <= 2);
      return EVENTS;
    }

    // Compute smooth snaking path points
    function computePath(evts) {
      if (!evts.length) return [];
      const n = evts.length;
      const MARGIN_X = 100, MARGIN_TOP = 70;
      const usableW = W - MARGIN_X * 2;
      const perRow = Math.max(4, Math.ceil(Math.sqrt(n * 1.5)));
      const rows = Math.ceil(n / perRow);
      const rowH = Math.max(80, (H - MARGIN_TOP - 60) / rows);
      const pts = [];

      for (let i = 0; i < n; i++) {
        const row = Math.floor(i / perRow);
        const idxInRow = i % perRow;
        const itemsThisRow = Math.min(perRow, n - row * perRow);
        const t = itemsThisRow > 1 ? idxInRow / (itemsThisRow - 1) : 0.5;
        const goRight = row % 2 === 0;
        const x = MARGIN_X + (goRight ? t : 1 - t) * usableW;
        const y = MARGIN_TOP + row * rowH + Math.sin(t * Math.PI) * rowH * 0.15;
        pts.push({ x, y, evt: evts[i] });
      }
      return pts;
    }

    // Generate smooth bezier path between points
    function buildCurvePath(pts) {
      if (pts.length < 2) return [];
      const segments = [];
      for (let i = 0; i < pts.length - 1; i++) {
        const p0 = pts[i], p1 = pts[i + 1];
        const mx = (p0.x + p1.x) / 2, my = (p0.y + p1.y) / 2;
        segments.push({ x0: p0.x, y0: p0.y, cx: p0.x, cy: my, x1: mx, y1: my });
        segments.push({ x0: mx, y0: my, cx: p1.x, cy: my, x1: p1.x, y1: p1.y });
      }
      return segments;
    }

    // Get point along bezier at t
    function bezierPoint(seg, t) {
      const u = 1 - t;
      return {
        x: u*u*seg.x0 + 2*u*t*seg.cx + t*t*seg.x1,
        y: u*u*seg.y0 + 2*u*t*seg.cy + t*t*seg.y1
      };
    }

    // Seed particles along path
    function seedParticles(segs) {
      particles = [];
      const count = Math.min(60, segs.length * 2);
      for (let i = 0; i < count; i++) {
        particles.push({
          seg: Math.floor(Math.random() * segs.length),
          t: Math.random(),
          speed: 0.002 + Math.random() * 0.004,
          size: 1 + Math.random() * 2,
          alpha: 0.3 + Math.random() * 0.5
        });
      }
    }

    function drawScene() {
      ctx.save();
      ctx.clearRect(0, 0, W, H);
      ctx.translate(panX, panY);
      ctx.scale(zoom, zoom);

      const evts = getVisibleEvents();
      const pts = computePath(evts);
      const segs = buildCurvePath(pts);

      dotPositions = pts.map((p, i) => ({
        screenX: p.x * zoom + panX, screenY: p.y * zoom + panY,
        idx: i, evt: p.evt, x: p.x, y: p.y
      }));

      if (segs.length > 0) {
        // Glow layer
        ctx.save();
        ctx.shadowColor = 'rgba(225,112,85,0.15)';
        ctx.shadowBlur = 20 / zoom;
        ctx.beginPath();
        ctx.moveTo(segs[0].x0, segs[0].y0);
        segs.forEach(s => ctx.quadraticCurveTo(s.cx, s.cy, s.x1, s.y1));
        ctx.strokeStyle = isDark ? 'rgba(225,112,85,0.08)' : 'rgba(225,112,85,0.06)';
        ctx.lineWidth = 8 / zoom;
        ctx.stroke();
        ctx.restore();

        // Draw gradient path segments
        for (let i = 0; i < segs.length; i++) {
          const s = segs[i];
          const evtIdx = Math.floor(i / 2);
          const evt0 = pts[Math.min(evtIdx, pts.length - 1)].evt;
          const evt1 = pts[Math.min(evtIdx + 1, pts.length - 1)].evt;
          const c0 = eraColors[evt0.era] || '#e17055';
          const c1 = eraColors[evt1.era] || '#e17055';

          const grad = ctx.createLinearGradient(s.x0, s.y0, s.x1, s.y1);
          grad.addColorStop(0, c0 + (isDark ? '30' : '25'));
          grad.addColorStop(1, c1 + (isDark ? '30' : '25'));

          ctx.beginPath();
          ctx.moveTo(s.x0, s.y0);
          ctx.quadraticCurveTo(s.cx, s.cy, s.x1, s.y1);
          ctx.strokeStyle = grad;
          ctx.lineWidth = 3 / zoom;
          ctx.stroke();
        }

        // Arrow at end
        const lastSeg = segs[segs.length - 1];
        const endP = bezierPoint(lastSeg, 1);
        const preP = bezierPoint(lastSeg, 0.8);
        const angle = Math.atan2(endP.y - preP.y, endP.x - preP.x);
        const aSize = 10 / zoom;
        ctx.save();
        ctx.translate(endP.x + Math.cos(angle) * 12 / zoom, endP.y + Math.sin(angle) * 12 / zoom);
        ctx.rotate(angle);
        ctx.beginPath();
        ctx.moveTo(aSize, 0);
        ctx.lineTo(-aSize, -aSize * 0.7);
        ctx.quadraticCurveTo(-aSize * 0.4, 0, -aSize, aSize * 0.7);
        ctx.closePath();
        const lastEvt = pts[pts.length - 1].evt;
        ctx.fillStyle = eraColors[lastEvt.era] || '#e17055';
        ctx.shadowColor = eraColors[lastEvt.era] || '#e17055';
        ctx.shadowBlur = 12 / zoom;
        ctx.fill();
        ctx.restore();

        // Particles
        if (particles.length === 0 || Math.abs(particles[0]._segCount - segs.length) > 2) {
          seedParticles(segs);
          particles.forEach(p => p._segCount = segs.length);
        }
        particles.forEach(p => {
          if (p.seg >= segs.length) p.seg = 0;
          const pt = bezierPoint(segs[p.seg], p.t);
          const evtI = Math.min(Math.floor(p.seg / 2), pts.length - 1);
          const col = eraColors[pts[evtI].evt.era] || '#e17055';

          ctx.beginPath();
          ctx.arc(pt.x, pt.y, p.size / zoom, 0, Math.PI * 2);
          ctx.fillStyle = col;
          ctx.globalAlpha = p.alpha;
          ctx.shadowColor = col;
          ctx.shadowBlur = 6 / zoom;
          ctx.fill();
          ctx.globalAlpha = 1;
          ctx.shadowBlur = 0;

          p.t += p.speed;
          if (p.t >= 1) { p.t = 0; p.seg++; if (p.seg >= segs.length) p.seg = 0; }
        });
      }

      // Draw dots
      pts.forEach((p, i) => {
        const baseR = p.evt.rank === 1 ? 7 : p.evt.rank === 2 ? 5 : 3.5;
        const isHov = hoveredIdx === i;
        const r = (isHov ? baseR * 1.5 : baseR) / zoom;
        const col = eraColors[p.evt.era] || '#e17055';

        // Pulse ring for hovered
        if (isHov) {
          ctx.beginPath();
          ctx.arc(p.x, p.y, r + 8 / zoom, 0, Math.PI * 2);
          ctx.fillStyle = col + '15';
          ctx.fill();
        }

        // Outer glow
        ctx.beginPath();
        ctx.arc(p.x, p.y, r + 3 / zoom, 0, Math.PI * 2);
        ctx.fillStyle = col + (isHov ? '40' : '20');
        ctx.fill();

        // Main dot
        ctx.beginPath();
        ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
        ctx.fillStyle = col;
        ctx.shadowColor = col;
        ctx.shadowBlur = isHov ? 12 / zoom : 4 / zoom;
        ctx.fill();
        ctx.shadowBlur = 0;

        // Inner highlight
        ctx.beginPath();
        ctx.arc(p.x, p.y, r * 0.4, 0, Math.PI * 2);
        ctx.fillStyle = isDark ? 'rgba(255,255,255,0.7)' : 'rgba(255,255,255,0.9)';
        ctx.fill();

        // Year label
        const fontSize = Math.max(7, (p.evt.rank === 1 ? 10 : 8) / Math.max(zoom, 0.5));
        ctx.font = `700 ${fontSize}px Inter, sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'bottom';
        ctx.fillStyle = isHov ? col : (isDark ? 'rgba(255,255,255,0.35)' : 'rgba(0,0,0,0.28)');
        const yearStr = p.evt.year < 0 ? Math.abs(p.evt.year) + ' BC' : p.evt.year + '';
        ctx.fillText(yearStr, p.x, p.y - r - 5 / zoom);

        // Title
        if (zoom >= 0.7 || p.evt.rank === 1) {
          const tSize = Math.max(6.5, (p.evt.rank === 1 ? 9 : 7) / Math.max(zoom, 0.5));
          ctx.font = `500 ${tSize}px Inter, sans-serif`;
          ctx.textBaseline = 'top';
          ctx.fillStyle = isHov ? (isDark ? '#fff' : '#1d1d1f') : (isDark ? 'rgba(255,255,255,0.25)' : 'rgba(0,0,0,0.2)');
          const d = isZh ? p.evt.zh : p.evt.en;
          const maxLen = Math.floor(24 / Math.max(zoom * 0.7, 0.35));
          const title = d.title.length > maxLen ? d.title.slice(0, maxLen - 1) + '…' : d.title;
          ctx.fillText(title, p.x, p.y + r + 5 / zoom);
        }
      });

      ctx.restore();
      document.getElementById('eventCount').textContent = evts.length + (isZh ? ' 个事件' : ' events');
    }

    function animate() {
      drawScene();
      animFrame = requestAnimationFrame(animate);
    }

    // Mouse events
    canvas.addEventListener('mousedown', e => {
      dragging = true; dragStartX = e.clientX; dragStartY = e.clientY; dragPanX = panX; dragPanY = panY;
    });
    canvas.addEventListener('mousemove', e => {
      if (dragging) {
        panX = dragPanX + (e.clientX - dragStartX);
        panY = dragPanY + (e.clientY - dragStartY);
        tooltip.classList.remove('show');
        return;
      }
      let found = -1;
      for (const dp of dotPositions) {
        if (Math.sqrt((e.clientX - dp.screenX) ** 2 + (e.clientY - dp.screenY) ** 2) < 20) { found = dp.idx; break; }
      }
      if (found !== hoveredIdx) {
        hoveredIdx = found;
        if (found >= 0) {
          const ev = dotPositions[found].evt;
          const d = isZh ? ev.zh : ev.en;
          const yearStr = ev.year < 0 ? Math.abs(ev.year) + ' BC' : ev.year + '';
          const eraObj = ERAS.find(er => er.id === ev.era);
          const eraName = eraObj ? (isZh ? eraObj.zh : eraObj.en) : '';
          tooltip.innerHTML = `<div class="tt-year">${yearStr}</div><div class="tt-title">${d.title}</div><p class="tt-desc">${d.desc}</p><div class="tt-era">${eraName}</div>`;
          tooltip.classList.add('show');
          canvas.style.cursor = 'pointer';
        } else {
          tooltip.classList.remove('show');
          canvas.style.cursor = 'grab';
        }
      }
      if (found >= 0) {
        let tx = e.clientX + 16, ty = e.clientY - 80;
        if (tx + 330 > W) tx = e.clientX - 340;
        if (ty < 60) ty = e.clientY + 20;
        if (ty + 200 > H) ty = H - 210;
        tooltip.style.left = tx + 'px'; tooltip.style.top = ty + 'px';
      }
    });
    canvas.addEventListener('mouseup', () => dragging = false);
    canvas.addEventListener('mouseleave', () => { dragging = false; hoveredIdx = -1; tooltip.classList.remove('show'); });

    // Zoom
    function applyZoom(delta, cx, cy) {
      const old = zoom;
      zoom = Math.max(0.25, Math.min(5, zoom * (1 + delta)));
      const s = zoom / old;
      panX = cx - (cx - panX) * s; panY = cy - (cy - panY) * s;
      particles = [];
    }
    canvas.addEventListener('wheel', e => { e.preventDefault(); applyZoom(e.deltaY > 0 ? -0.08 : 0.08, e.clientX, e.clientY); }, { passive: false });
    document.getElementById('zoomIn').addEventListener('click', () => applyZoom(0.25, W/2, H/2));
    document.getElementById('zoomOut').addEventListener('click', () => applyZoom(-0.25, W/2, H/2));
    document.getElementById('zoomReset').addEventListener('click', () => { zoom = 1; panX = 0; panY = 0; particles = []; });

    // Touch
    let lastTouchDist = 0;
    canvas.addEventListener('touchstart', e => {
      if (e.touches.length === 1) {
        dragging = true; dragStartX = e.touches[0].clientX; dragStartY = e.touches[0].clientY; dragPanX = panX; dragPanY = panY;
        for (const dp of dotPositions) {
          if (Math.sqrt((e.touches[0].clientX - dp.screenX)**2 + (e.touches[0].clientY - dp.screenY)**2) < 24) {
            const ev = dp.evt, d = isZh ? ev.zh : ev.en;
            const yearStr = ev.year < 0 ? Math.abs(ev.year) + ' BC' : ev.year + '';
            const eraObj = ERAS.find(er => er.id === ev.era);
            tooltip.innerHTML = `<div class="tt-year">${yearStr}</div><div class="tt-title">${d.title}</div><p class="tt-desc">${d.desc}</p><div class="tt-era">${eraObj ? (isZh ? eraObj.zh : eraObj.en) : ''}</div>`;
            tooltip.classList.add('show');
            tooltip.style.left = Math.min(e.touches[0].clientX+10, W-280)+'px';
            tooltip.style.top = Math.max(e.touches[0].clientY-120, 60)+'px';
            hoveredIdx = dp.idx; e.preventDefault(); return;
          }
        }
        tooltip.classList.remove('show'); hoveredIdx = -1;
      }
      if (e.touches.length === 2) {
        const dx = e.touches[0].clientX-e.touches[1].clientX, dy = e.touches[0].clientY-e.touches[1].clientY;
        lastTouchDist = Math.sqrt(dx*dx+dy*dy);
      }
    }, { passive: false });
    canvas.addEventListener('touchmove', e => {
      if (e.touches.length === 1 && dragging) {
        panX = dragPanX+(e.touches[0].clientX-dragStartX); panY = dragPanY+(e.touches[0].clientY-dragStartY);
        tooltip.classList.remove('show'); e.preventDefault();
      }
      if (e.touches.length === 2) {
        const dx = e.touches[0].clientX-e.touches[1].clientX, dy = e.touches[0].clientY-e.touches[1].clientY;
        const dist = Math.sqrt(dx*dx+dy*dy);
        if (lastTouchDist > 0) {
          const cx = (e.touches[0].clientX+e.touches[1].clientX)/2, cy = (e.touches[0].clientY+e.touches[1].clientY)/2;
          applyZoom((dist-lastTouchDist)*0.005, cx, cy);
        }
        lastTouchDist = dist; e.preventDefault();
      }
    }, { passive: false });
    canvas.addEventListener('touchend', () => { dragging = false; lastTouchDist = 0; });

    window.addEventListener('resize', () => { resizeCanvas(); particles = []; });
    animate();
  </script>
</body>
</html>
