<!DOCTYPE html>
<html lang="en">

<head>
  <title>Travel — Zhaomin Xiao</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/fontawesome/css/fontawesome.min.css">
  <link rel="stylesheet" href="../assets/fontawesome/css/solid.min.css">
  <link rel="stylesheet" href="../assets/css/apple.css">
  <link rel="icon" type="image/png" href="../assets/img/favicon.png">
  <script src="https://unpkg.com/globe.gl@2.32.0/dist/globe.gl.min.js"></script>
  <style>
    .travel-page ::selection {
      background: rgba(225, 112, 85, 0.35);
      color: #fff;
    }

    .travel-page {
      min-height: 100vh;
      background: #0a0a1a;
      position: relative;
      overflow: hidden;
    }

    .travel-nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(10, 10, 26, 0.6);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    .travel-nav a {
      color: rgba(255,255,255,0.7);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 500;
      font-family: 'Inter', sans-serif;
      transition: color 0.3s;
    }

    .travel-nav a:hover {
      color: #fff;
    }

    .travel-title {
      color: #fff;
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    #globeContainer {
      width: 100%;
      height: 100vh;
    }

    .travel-tooltip {
      background: rgba(20, 20, 40, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 12px;
      padding: 12px;
      width: 260px;
      font-family: 'Inter', sans-serif;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 8px 30px rgba(0,0,0,0.4);
      pointer-events: none;
    }

    .travel-tooltip img {
      width: 100%;
      height: 120px;
      object-fit: cover;
      border-radius: 8px;
      margin-bottom: 8px;
    }

    .travel-tooltip h4 {
      color: #fff;
      font-size: 0.9rem;
      font-weight: 700;
      margin: 0 0 4px 0;
    }

    .travel-tooltip p {
      color: rgba(255,255,255,0.6);
      font-size: 0.75rem;
      margin: 0;
      line-height: 1.4;
    }

    .travel-marker {
      cursor: pointer; position: relative;
      transition: transform 0.2s;
      pointer-events: auto;
    }
    .travel-marker:hover { transform: scale(1.08); z-index: 10; }

    .cluster-thumb {
      width: 64px; height: 64px; border-radius: 12px;
      object-fit: cover; border: 2px solid rgba(255,255,255,0.85);
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
      display: block; pointer-events: auto; cursor: pointer;
    }
    .cluster-badge {
      position: absolute; top: -6px; right: -6px;
      min-width: 22px; height: 22px; border-radius: 11px;
      background: #e17055; color: #fff;
      font-size: 0.65rem; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      padding: 0 5px; box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      border: 2px solid rgba(255,255,255,0.9);
    }
    .cluster-badge.single { display: none; }

    /* ── Photo gallery overlay ── */
    .gallery-overlay {
      position: fixed; inset: 0; z-index: 300;
      background: rgba(0,0,0,0.75); backdrop-filter: blur(12px);
      display: none; flex-direction: column; align-items: center;
      opacity: 0; transition: opacity 0.3s ease;
      overflow-y: auto;
    }
    .gallery-overlay.show { display: flex; opacity: 1; }

    .gallery-header {
      width: 100%; max-width: 800px; padding: 1.5rem 2rem 1rem;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 10;
    }
    .gallery-title {
      font-family: 'Playfair Display', serif; font-size: 1.3rem;
      font-weight: 700; color: #fff;
    }
    .gallery-subtitle {
      font-size: 0.78rem; color: rgba(255,255,255,0.5); margin-top: 0.15rem;
    }
    .gallery-close {
      background: rgba(255,255,255,0.1); border: none; cursor: pointer;
      color: #fff; width: 36px; height: 36px; border-radius: 50%;
      font-size: 1rem; display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
    }
    .gallery-close:hover { background: rgba(255,255,255,0.2); }

    .gallery-grid {
      width: 100%; max-width: 800px; padding: 0 2rem 2rem;
      display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 8px;
    }
    .gallery-img {
      width: 100%; aspect-ratio: 4/3; object-fit: cover;
      border-radius: 8px; cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .gallery-img:hover {
      transform: scale(1.03);
      box-shadow: 0 8px 25px rgba(0,0,0,0.4);
    }

    /* Full-size lightbox */
    .lightbox {
      position: fixed; inset: 0; z-index: 400;
      background: rgba(0,0,0,0.9); display: none;
      align-items: center; justify-content: center;
      cursor: pointer; opacity: 0; transition: opacity 0.3s ease;
    }
    .lightbox.show { display: flex; opacity: 1; }
    .lightbox img {
      max-width: 80vw; max-height: 90vh; border-radius: 6px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .lb-btn {
      position: absolute; top: 50%; transform: translateY(-50%);
      background: rgba(255,255,255,0.15); border: none;
      color: #fff; font-size: 1.5rem; cursor: pointer;
      width: 48px; height: 48px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s; backdrop-filter: blur(8px);
    }
    .lb-btn:hover { background: rgba(255,255,255,0.3); }
    .lb-prev { left: 1.5rem; }
    .lb-next { right: 1.5rem; }
    .lb-close {
      position: absolute; top: 1.5rem; right: 1.5rem;
      background: rgba(255,255,255,0.15); border: none;
      color: #fff; font-size: 1.2rem; cursor: pointer;
      width: 40px; height: 40px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s; backdrop-filter: blur(8px);
    }
    .lb-close:hover { background: rgba(255,255,255,0.3); }

    /* Skeleton loading overlay */
    .travel-skeleton {
      position: fixed; inset: 0; z-index: 50;
      background: #0a0a1a;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 1.5rem;
      transition: opacity 0.6s ease;
    }
    .travel-skeleton.hidden {
      opacity: 0; pointer-events: none;
    }
    .skeleton-globe {
      width: 200px; height: 200px; border-radius: 50%;
      background: linear-gradient(135deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.03) 100%);
      background-size: 200% 200%;
      animation: skeletonPulse 1.5s ease-in-out infinite;
    }
    .skeleton-bar {
      height: 10px; border-radius: 5px;
      background: rgba(255,255,255,0.06);
      background-size: 200% 100%;
      animation: skeletonPulse 1.5s ease-in-out infinite;
    }
    @keyframes skeletonPulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }

    .travel-instructions {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.4);
      font-family: 'Inter', sans-serif;
      font-size: 0.78rem;
      text-align: center;
      pointer-events: none;
      z-index: 10;
    }

    .travel-legend {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: rgba(255,255,255,0.5);
      font-family: 'Inter', sans-serif;
      font-size: 0.72rem;
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #e17055;
      box-shadow: 0 0 8px rgba(225, 112, 85, 0.5);
    }
  </style>
</head>

<body class="travel-page">

  <div class="travel-nav">
    <a href="../index.html"><i class="fas fa-arrow-left"></i> <span class="lang-en">Back</span><span class="lang-zh">返回</span></a>
    <span class="travel-title"><span class="lang-en">Travel</span><span class="lang-zh">旅行</span></span>
    <div></div>
  </div>

  <div class="travel-skeleton" id="travelSkeleton">
    <div class="skeleton-globe"></div>
    <div class="skeleton-bar" style="width:160px;"></div>
    <div class="skeleton-bar" style="width:120px; animation-delay:0.2s;"></div>
  </div>

  <div id="globeContainer"></div>

  <!-- Photo gallery overlay (opens on marker click, globe stays in background) -->
  <div class="gallery-overlay" id="galleryOverlay">
    <div class="gallery-header">
      <div>
        <div class="gallery-title" id="galleryTitle"></div>
        <div class="gallery-subtitle" id="gallerySubtitle"></div>
      </div>
      <button class="gallery-close" id="galleryClose"><i class="fas fa-times"></i></button>
    </div>
    <div class="gallery-grid" id="galleryGrid"></div>
  </div>

  <!-- Full-size lightbox with prev/next -->
  <div class="lightbox" id="lightbox">
    <button class="lb-btn lb-prev" id="lbPrev"><i class="fas fa-chevron-left"></i></button>
    <img id="lightboxImg" src="" alt="">
    <button class="lb-btn lb-next" id="lbNext"><i class="fas fa-chevron-right"></i></button>
    <button class="lb-close" id="lbClose"><i class="fas fa-times"></i></button>
  </div>

  <div class="travel-instructions">
    <span class="lang-en">Drag to rotate · Scroll to zoom · Hover markers for details</span>
    <span class="lang-zh">拖动旋转 · 滚轮缩放 · 悬停标记查看详情</span>
  </div>

  <div class="travel-legend">
    <div class="legend-item">
      <div class="legend-dot"></div>
      <span class="lang-en">Places I've been</span><span class="lang-zh">去过的地方</span>
    </div>
  </div>

  <script>
    /* ── Dark mode & language preference (synced with index.html via localStorage) ── */
    if (localStorage.getItem('darkMode') === 'true') document.body.classList.add('dark-mode');
    if (localStorage.getItem('lang') === 'zh') {
      document.body.classList.add('zh');
      document.documentElement.lang = 'zh';
    }

    const isZh = document.body.classList.contains('zh');

    /* ── Firebase config ── */
    const FB_DB = 'https://zhaomin-homepage-default-rtdb.firebaseio.com';

    let places = [];

    /* ── Load places from Firebase Realtime Database ──
       Cloud Function writes to /travel-photos/ on every Storage upload.
       This page just reads that data — no EXIF parsing needed client-side. */
    async function loadPlaces() {
      const instrEl = document.querySelector('.travel-instructions');
      instrEl.innerHTML = '<span>Loading photos...</span>';

      try {
        const r = await fetch(`${FB_DB}/travel-photos.json`);
        const data = await r.json();

        if (data) {
          places = Object.values(data)
            .filter(p => p.lat && p.lng && p.url)
            .map(p => ({
              name: p.location || p.file || '',
              desc: p.date ? (isZh ? '拍摄于 ' + p.date : 'Taken on ' + p.date) : '',
              lat: p.lat,
              lng: p.lng,
              img: p.url,
            }));
        }
      } catch (e) {
        console.error('Failed to load travel data:', e);
      }

      if (places.length > 0) {
        instrEl.innerHTML =
          '<span class="lang-en">Drag to rotate · Scroll to zoom · Hover markers for details</span>' +
          '<span class="lang-zh">拖动旋转 · 滚轮缩放 · 悬停标记查看详情</span>';
      } else {
        instrEl.innerHTML =
          '<span class="lang-en">No photos yet — upload geotagged photos to Firebase Storage /images/travel/</span>' +
          '<span class="lang-zh">还没有照片 — 上传带GPS的照片到 Firebase Storage 的 travel/ 文件夹</span>';
      }
    }

    /* ── Clustering: group nearby photos based on zoom level ──
       At low zoom (zoomed out), cluster broadly; at high zoom, split into individual photos.
       Each cluster shows a thumbnail of one photo + a count badge. */
    function clusterPlaces(places, radius) {
      const used = new Set();
      const clusters = [];
      for (let i = 0; i < places.length; i++) {
        if (used.has(i)) continue;
        const cluster = [places[i]];
        used.add(i);
        for (let j = i + 1; j < places.length; j++) {
          if (used.has(j)) continue;
          const dist = Math.sqrt(
            Math.pow(places[i].lat - places[j].lat, 2) +
            Math.pow(places[i].lng - places[j].lng, 2)
          );
          if (dist < radius) { cluster.push(places[j]); used.add(j); }
        }
        const avgLat = cluster.reduce((s, p) => s + p.lat, 0) / cluster.length;
        const avgLng = cluster.reduce((s, p) => s + p.lng, 0) / cluster.length;
        // Sample up to 4 photos once at cluster creation time (stable across hovers)
        const sampled = [...cluster].sort(() => Math.random() - 0.5).slice(0, 4);
        clusters.push({ lat: avgLat, lng: avgLng, photos: cluster, sampled: sampled, thumb: cluster[0].img, count: cluster.length });
      }
      return clusters;
    }

    let currentClusters = [];
    let lastZoom = -1;
    let clusterTimer = null;

    /* Debounced clustering — waits until zoom/pan settles to avoid
       destroying and recreating DOM elements on every frame */
    function updateClusters() {
      const pov = globe.pointOfView();
      const alt = pov.altitude || 2.5;
      const newZoom = Math.round(alt * 10);
      if (newZoom === lastZoom) return;

      clearTimeout(clusterTimer);
      clusterTimer = setTimeout(() => {
        lastZoom = newZoom;
        const radius = Math.max(0.5, alt * 8);
        currentClusters = clusterPlaces(places, radius);
        globe.htmlElementsData(currentClusters);
      }, 300);
    }

    /* Immediate version for initial load */
    function updateClustersNow() {
      const pov = globe.pointOfView();
      const alt = pov.altitude || 2.5;
      lastZoom = Math.round(alt * 10);
      const radius = Math.max(0.5, alt * 8);
      currentClusters = clusterPlaces(places, radius);
      globe.htmlElementsData(currentClusters);
    }

    /* ── Globe initialization ── */
    const globe = Globe()
      .globeImageUrl('https://unpkg.com/three-globe@2.32.0/example/img/earth-blue-marble.jpg')
      .bumpImageUrl('https://unpkg.com/three-globe@2.32.0/example/img/earth-topology.png')
      .backgroundImageUrl('https://unpkg.com/three-globe@2.32.0/example/img/night-sky.png')
      .showAtmosphere(true)
      .atmosphereColor('#6366f1')
      .atmosphereAltitude(0.2)
      .htmlElementsData([])
      .htmlLat('lat')
      .htmlLng('lng')
      .htmlAltitude(0.03)
      .htmlElement(d => {
        const el = document.createElement('div');
        el.className = 'travel-marker';
        el.style.pointerEvents = 'auto';

        // Thumbnail image (clickable — opens gallery)
        const img = document.createElement('img');
        img.className = 'cluster-thumb';
        img.src = d.thumb;
        img.alt = d.count + ' photos';
        img.addEventListener('click', (e) => {
          e.stopPropagation();
          document.querySelectorAll('.travel-tooltip').forEach(t => t.remove());
          openGallery(d);
        });
        el.appendChild(img);

        // Count badge (hidden if single photo)
        const badge = document.createElement('div');
        badge.className = 'cluster-badge' + (d.count <= 1 ? ' single' : '');
        badge.textContent = d.count;
        el.appendChild(badge);

        // Tooltip on hover: 2x2 grid of up to 4 randomly sampled photos
        el.addEventListener('mouseenter', () => {
          document.querySelectorAll('.travel-tooltip').forEach(t => t.remove());
          const tooltip = document.createElement('div');
          tooltip.className = 'travel-tooltip';

          // Use the pre-sampled photos (stable — sampled once at cluster creation)
          const sampled = d.sampled;
          const remaining = d.count - sampled.length;

          let html = '<div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:8px;">';
          sampled.forEach(p => {
            html += `<img src="${p.img}" style="width:100%;aspect-ratio:4/3;object-fit:cover;border-radius:6px;">`;
          });
          html += '</div>';
          html += `<h4>${d.photos[0].name}</h4>`;
          html += `<p>${d.count} ${isZh ? '张照片' : (d.count === 1 ? 'photo' : 'photos')}${remaining > 0 ? (isZh ? '，还有 ' + remaining + ' 张' : ', ' + remaining + ' more') : ''}${d.photos[0].desc ? ' · ' + d.photos[0].desc : ''}</p>`;
          tooltip.innerHTML = html;

          tooltip.style.position = 'fixed';
          const rect = el.getBoundingClientRect();
          let tx = rect.left + rect.width / 2 - 120;
          let ty = rect.top - 200;
          if (tx < 10) tx = 10;
          if (tx + 250 > window.innerWidth) tx = window.innerWidth - 260;
          if (ty < 10) ty = rect.bottom + 10;
          tooltip.style.left = tx + 'px';
          tooltip.style.top = ty + 'px';
          tooltip.style.zIndex = '200';
          document.body.appendChild(tooltip);
        });

        el.addEventListener('mouseleave', () => {
          setTimeout(() => {
            document.querySelectorAll('.travel-tooltip').forEach(t => t.remove());
          }, 300);
        });

        // Click to open gallery overlay with all photos in this cluster
        el.addEventListener('click', () => {
          document.querySelectorAll('.travel-tooltip').forEach(t => t.remove());
          openGallery(d);
        });

        return el;
      })
      (document.getElementById('globeContainer'));

    // Static globe — no auto-rotation
    globe.controls().autoRotate = false;
    globe.controls().enableDamping = true;

    // Load photos from Firebase, then render clusters
    loadPlaces().then(() => {
      updateClustersNow();
      setTimeout(updateClustersNow, 1000);
      setTimeout(updateClustersNow, 3000);
      document.getElementById('travelSkeleton').classList.add('hidden');
    });

    // Re-cluster when user zooms or pans
    globe.controls().addEventListener('change', updateClusters);

    // Responsive resize
    window.addEventListener('resize', () => {
      globe.width(window.innerWidth);
      globe.height(window.innerHeight);
    });

    /* ── Photo gallery overlay ── */
    const galleryOverlay = document.getElementById('galleryOverlay');
    const galleryGrid = document.getElementById('galleryGrid');
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightboxImg');
    let currentGalleryPhotos = [];
    let currentLbIndex = 0;

    function openGallery(cluster) {
      document.getElementById('galleryTitle').textContent = cluster.photos[0].name || 'Photos';
      document.getElementById('gallerySubtitle').textContent =
        cluster.count + (isZh ? ' 张照片' : (cluster.count === 1 ? ' photo' : ' photos'));

      currentGalleryPhotos = cluster.photos;
      galleryGrid.innerHTML = '';
      cluster.photos.forEach((p, i) => {
        const img = document.createElement('img');
        img.className = 'gallery-img';
        img.src = p.img;
        img.alt = p.name || '';
        img.loading = 'lazy';
        img.addEventListener('click', () => openLightbox(i));
        galleryGrid.appendChild(img);
      });

      galleryOverlay.style.display = 'flex';
      requestAnimationFrame(() => galleryOverlay.classList.add('show'));
    }

    function openLightbox(index) {
      currentLbIndex = index;
      lightboxImg.src = currentGalleryPhotos[index].img;
      lightbox.classList.add('show');
    }

    function lbNav(delta) {
      currentLbIndex = (currentLbIndex + delta + currentGalleryPhotos.length) % currentGalleryPhotos.length;
      lightboxImg.src = currentGalleryPhotos[currentLbIndex].img;
    }

    function closeGallery() {
      galleryOverlay.classList.remove('show');
      setTimeout(() => { galleryOverlay.style.display = 'none'; }, 300);
    }

    document.getElementById('galleryClose').addEventListener('click', closeGallery);
    galleryOverlay.addEventListener('click', e => { if (e.target === galleryOverlay) closeGallery(); });

    document.getElementById('lbPrev').addEventListener('click', e => { e.stopPropagation(); lbNav(-1); });
    document.getElementById('lbNext').addEventListener('click', e => { e.stopPropagation(); lbNav(1); });
    document.getElementById('lbClose').addEventListener('click', e => { e.stopPropagation(); lightbox.classList.remove('show'); });
    lightbox.addEventListener('click', e => { if (e.target === lightbox) lightbox.classList.remove('show'); });

    document.addEventListener('keydown', e => {
      if (lightbox.classList.contains('show')) {
        if (e.key === 'Escape') lightbox.classList.remove('show');
        if (e.key === 'ArrowLeft') lbNav(-1);
        if (e.key === 'ArrowRight') lbNav(1);
      } else if (galleryOverlay.classList.contains('show')) {
        if (e.key === 'Escape') closeGallery();
      }
    });
  </script>

</body>
</html>
