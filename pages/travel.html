<!DOCTYPE html>
<html lang="en">

<head>
  <title>Travel — Zhaomin Xiao</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <script defer src="../assets/fontawesome/js/all.min.js"></script>
  <link rel="stylesheet" href="../assets/css/apple.css">
  <link rel="icon" type="image/svg+xml" href="../img/favicon.svg">
  <script src="https://unpkg.com/globe.gl@2.32.0/dist/globe.gl.min.js"></script>
  <script src="../assets/js/places.js"></script>
  <style>
    .travel-page ::selection {
      background: rgba(225, 112, 85, 0.35);
      color: #fff;
    }

    .travel-page {
      min-height: 100vh;
      background: #0a0a1a;
      position: relative;
      overflow: hidden;
    }

    .travel-nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(10, 10, 26, 0.6);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    .travel-nav a {
      color: rgba(255,255,255,0.7);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 500;
      font-family: 'Inter', sans-serif;
      transition: color 0.3s;
    }

    .travel-nav a:hover {
      color: #fff;
    }

    .travel-title {
      color: #fff;
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    #globeContainer {
      width: 100%;
      height: 100vh;
    }

    .travel-tooltip {
      background: rgba(20, 20, 40, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 12px;
      padding: 12px;
      max-width: 240px;
      font-family: 'Inter', sans-serif;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    }

    .travel-tooltip img {
      width: 100%;
      height: 120px;
      object-fit: cover;
      border-radius: 8px;
      margin-bottom: 8px;
    }

    .travel-tooltip h4 {
      color: #fff;
      font-size: 0.9rem;
      font-weight: 700;
      margin: 0 0 4px 0;
    }

    .travel-tooltip p {
      color: rgba(255,255,255,0.6);
      font-size: 0.75rem;
      margin: 0;
      line-height: 1.4;
    }

    .travel-marker {
      cursor: pointer; position: relative;
      transition: transform 0.2s;
    }
    .travel-marker:hover { transform: scale(1.08); z-index: 10; }

    .cluster-thumb {
      width: 64px; height: 64px; border-radius: 12px;
      object-fit: cover; border: 2px solid rgba(255,255,255,0.85);
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
      display: block;
    }
    .cluster-badge {
      position: absolute; top: -6px; right: -6px;
      min-width: 22px; height: 22px; border-radius: 11px;
      background: #e17055; color: #fff;
      font-size: 0.65rem; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      padding: 0 5px; box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      border: 2px solid rgba(255,255,255,0.9);
    }
    .cluster-badge.single { display: none; }

    .travel-instructions {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.4);
      font-family: 'Inter', sans-serif;
      font-size: 0.78rem;
      text-align: center;
      pointer-events: none;
      z-index: 10;
    }

    .travel-legend {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: rgba(255,255,255,0.5);
      font-family: 'Inter', sans-serif;
      font-size: 0.72rem;
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #e17055;
      box-shadow: 0 0 8px rgba(225, 112, 85, 0.5);
    }
  </style>
</head>

<body class="travel-page">

  <div class="travel-nav">
    <a href="../index.html"><i class="fas fa-arrow-left"></i> <span class="lang-en">Back</span><span class="lang-zh">返回</span></a>
    <span class="travel-title"><span class="lang-en">Travel</span><span class="lang-zh">旅行</span></span>
    <div></div>
  </div>

  <div id="globeContainer"></div>

  <div class="travel-instructions">
    <span class="lang-en">Drag to rotate · Scroll to zoom · Hover markers for details</span>
    <span class="lang-zh">拖动旋转 · 滚轮缩放 · 悬停标记查看详情</span>
  </div>

  <div class="travel-legend">
    <div class="legend-item">
      <div class="legend-dot"></div>
      <span class="lang-en">Places I've been</span><span class="lang-zh">去过的地方</span>
    </div>
  </div>

  <script>
    /* ── Dark mode & language preference (synced with index.html via localStorage) ── */
    if (localStorage.getItem('darkMode') === 'true') document.body.classList.add('dark-mode');
    if (localStorage.getItem('lang') === 'zh') {
      document.body.classList.add('zh');
      document.documentElement.lang = 'zh';
    }

    const isZh = document.body.classList.contains('zh');

    /* ── PLACES is auto-generated by build-travel.py from EXIF GPS data.
       Each entry: { file, lat, lng, date }
       Only photos with valid GPS data appear on the globe. ── */
    const places = PLACES.map(p => ({
      name: p.location || p.file,
      desc: p.date ? (isZh ? '拍摄于 ' + p.date : 'Taken on ' + p.date) : '',
      lat: p.lat,
      lng: p.lng,
      img: '../img/travel/' + p.file,
    }));

    if (places.length === 0) {
      document.querySelector('.travel-instructions').innerHTML =
        '<span class="lang-en">No geotagged photos yet — add photos with GPS data to img/travel/ and run build-travel.py</span>' +
        '<span class="lang-zh">还没有带GPS数据的照片 — 将带有GPS数据的照片添加到 img/travel/ 并运行 build-travel.py</span>';
    }

    /* ── Clustering: group nearby photos based on zoom level ──
       At low zoom (zoomed out), cluster broadly; at high zoom, split into individual photos.
       Each cluster shows a thumbnail of one photo + a count badge. */
    function clusterPlaces(places, radius) {
      const used = new Set();
      const clusters = [];
      for (let i = 0; i < places.length; i++) {
        if (used.has(i)) continue;
        const cluster = [places[i]];
        used.add(i);
        for (let j = i + 1; j < places.length; j++) {
          if (used.has(j)) continue;
          const dist = Math.sqrt(
            Math.pow(places[i].lat - places[j].lat, 2) +
            Math.pow(places[i].lng - places[j].lng, 2)
          );
          if (dist < radius) { cluster.push(places[j]); used.add(j); }
        }
        const avgLat = cluster.reduce((s, p) => s + p.lat, 0) / cluster.length;
        const avgLng = cluster.reduce((s, p) => s + p.lng, 0) / cluster.length;
        clusters.push({ lat: avgLat, lng: avgLng, photos: cluster, thumb: cluster[0].img, count: cluster.length });
      }
      return clusters;
    }

    let currentClusters = [];
    let lastZoom = -1;

    function updateClusters() {
      const pov = globe.pointOfView();
      const alt = pov.altitude || 2.5;
      // Cluster radius shrinks as user zooms in
      const radius = Math.max(0.5, alt * 8);
      const newZoom = Math.round(alt * 10);
      if (newZoom === lastZoom) return;
      lastZoom = newZoom;

      currentClusters = clusterPlaces(places, radius);
      globe.htmlElementsData(currentClusters);
    }

    /* ── Globe initialization ── */
    const globe = Globe()
      .globeImageUrl('https://unpkg.com/three-globe@2.32.0/example/img/earth-blue-marble.jpg')
      .bumpImageUrl('https://unpkg.com/three-globe@2.32.0/example/img/earth-topology.png')
      .backgroundImageUrl('https://unpkg.com/three-globe@2.32.0/example/img/night-sky.png')
      .showAtmosphere(true)
      .atmosphereColor('#6366f1')
      .atmosphereAltitude(0.2)
      .htmlElementsData([])
      .htmlLat('lat')
      .htmlLng('lng')
      .htmlAltitude(0.03)
      .htmlElement(d => {
        const el = document.createElement('div');
        el.className = 'travel-marker';

        // Thumbnail image
        const img = document.createElement('img');
        img.className = 'cluster-thumb';
        img.src = d.thumb;
        img.alt = d.count + ' photos';
        el.appendChild(img);

        // Count badge (hidden if single photo)
        const badge = document.createElement('div');
        badge.className = 'cluster-badge' + (d.count <= 1 ? ' single' : '');
        badge.textContent = d.count;
        el.appendChild(badge);

        // Tooltip on hover showing all photos in the cluster
        el.addEventListener('mouseenter', () => {
          document.querySelectorAll('.travel-tooltip').forEach(t => t.remove());
          const tooltip = document.createElement('div');
          tooltip.className = 'travel-tooltip';

          let html = '<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px;">';
          d.photos.slice(0, 6).forEach(p => {
            html += `<img src="${p.img}" style="width:70px;height:52px;object-fit:cover;border-radius:6px;">`;
          });
          if (d.photos.length > 6) html += `<div style="display:flex;align-items:center;justify-content:center;width:70px;height:52px;border-radius:6px;background:rgba(0,0,0,0.3);color:#fff;font-size:0.75rem;font-weight:600;">+${d.photos.length - 6}</div>`;
          html += '</div>';
          html += `<h4>${d.photos[0].name}</h4>`;
          html += `<p>${d.count} ${isZh ? '张照片' : (d.count === 1 ? 'photo' : 'photos')}${d.photos[0].desc ? ' · ' + d.photos[0].desc : ''}</p>`;
          tooltip.innerHTML = html;

          tooltip.style.position = 'fixed';
          const rect = el.getBoundingClientRect();
          let tx = rect.left + rect.width / 2 - 120;
          let ty = rect.top - 200;
          if (tx < 10) tx = 10;
          if (tx + 250 > window.innerWidth) tx = window.innerWidth - 260;
          if (ty < 10) ty = rect.bottom + 10;
          tooltip.style.left = tx + 'px';
          tooltip.style.top = ty + 'px';
          tooltip.style.zIndex = '200';
          document.body.appendChild(tooltip);
        });

        el.addEventListener('mouseleave', () => {
          setTimeout(() => {
            document.querySelectorAll('.travel-tooltip').forEach(t => t.remove());
          }, 300);
        });

        return el;
      })
      (document.getElementById('globeContainer'));

    // Auto-rotation
    globe.controls().autoRotate = true;
    globe.controls().autoRotateSpeed = 0.5;
    globe.controls().enableDamping = true;

    // Initial clustering
    setTimeout(updateClusters, 500);

    // Re-cluster when user zooms or pans
    globe.controls().addEventListener('change', updateClusters);

    // Responsive resize
    window.addEventListener('resize', () => {
      globe.width(window.innerWidth);
      globe.height(window.innerHeight);
    });
  </script>

</body>
</html>
