<!DOCTYPE html>
<html lang="en">

<head>
  <title>Reading — Zhaomin Xiao</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <script defer src="assets/fontawesome/js/all.min.js"></script>
  <link rel="icon" type="image/svg+xml" href="img/favicon.svg">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #f5efe6;
      --wall: #ede4d4;
      --shelf-top: #8b5e3c;
      --shelf-front: #6b3f20;
      --shelf-shadow: rgba(80, 40, 10, 0.25);
      --text: #3b2f1e;
      --text-sec: #7a6b5a;
      --card-bg: rgba(255,255,255,0.85);
      --card-shadow: rgba(80, 40, 10, 0.15);
    }

    body.dark-mode {
      --bg: #1a1410;
      --wall: #211a12;
      --shelf-top: #5c3d24;
      --shelf-front: #3e2714;
      --shelf-shadow: rgba(0, 0, 0, 0.5);
      --text: #e8dcc8;
      --text-sec: #a89880;
      --card-bg: rgba(40, 30, 20, 0.9);
      --card-shadow: rgba(0, 0, 0, 0.4);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    .lang-zh { display: none; }
    body.zh .lang-en { display: none; }
    body.zh .lang-zh { display: inline; }

    /* Nav */
    .r-nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      padding: 0 2rem; height: 48px;
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(245,239,230,0.8);
      backdrop-filter: saturate(180%) blur(20px); -webkit-backdrop-filter: saturate(180%) blur(20px);
    }
    body.dark-mode .r-nav { background: rgba(26,20,16,0.85); }
    .r-nav a { color: var(--text-sec); text-decoration: none; font-size: 0.85rem; font-weight: 500; transition: color 0.3s; }
    .r-nav a:hover { color: var(--text); }
    .r-nav-title { font-family: 'Playfair Display', serif; font-size: 1.1rem; font-weight: 700; color: var(--text); }
    .r-nav-right { display: flex; align-items: center; gap: 0.5rem; }

    /* Page content */
    .bookshelf-page {
      padding: 5rem 2rem 3rem;
      max-width: 1100px;
      margin: 0 auto;
    }

    .page-header {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    .page-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 0.4rem;
    }
    .page-header p {
      font-size: 1rem;
      color: var(--text-sec);
    }

    /* Shelf unit */
    .shelf-section {
      margin-bottom: 1rem;
    }

    .shelf-label {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-sec);
      margin-bottom: 0.6rem;
      padding-left: 0.5rem;
    }

    .shelf {
      position: relative;
      padding: 1.2rem 1rem 0;
      min-height: 160px;
      display: flex;
      align-items: flex-end;
      gap: 6px;
      flex-wrap: wrap;
      background: var(--wall);
      border-radius: 8px 8px 0 0;
    }

    /* Wooden shelf plank */
    .shelf-plank {
      width: 100%;
      height: 14px;
      background: linear-gradient(180deg, var(--shelf-top) 0%, var(--shelf-front) 60%, var(--shelf-front) 100%);
      border-radius: 0 0 3px 3px;
      box-shadow: 0 4px 12px var(--shelf-shadow);
      position: relative;
    }
    .shelf-plank::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: rgba(255,255,255,0.15);
      border-radius: 2px 2px 0 0;
    }

    /* Book spine */
    .book {
      width: 36px;
      border-radius: 3px 5px 5px 3px;
      cursor: pointer;
      position: relative;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .book:hover {
      transform: translateY(-14px) rotate(-2deg);
      box-shadow: 4px 8px 20px rgba(0,0,0,0.3);
      z-index: 10;
    }

    /* Book spine title (rotated) */
    .book-spine {
      writing-mode: vertical-rl;
      text-orientation: mixed;
      font-size: 0.55rem;
      font-weight: 600;
      color: rgba(255,255,255,0.85);
      letter-spacing: 0.02em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-height: calc(100% - 16px);
      padding: 8px 2px;
      text-shadow: 0 1px 2px rgba(0,0,0,0.3);
    }

    /* Decorative spine details */
    .book::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: rgba(0,0,0,0.15);
      border-radius: 3px 0 0 3px;
    }
    .book::after {
      content: '';
      position: absolute;
      top: 6px; right: 4px;
      width: 8px; height: 2px;
      background: rgba(255,255,255,0.2);
      border-radius: 1px;
    }

    /* Book detail popup */
    .book-popup {
      display: none;
      position: absolute;
      bottom: calc(100% + 16px);
      left: 50%;
      transform: translateX(-50%);
      width: 260px;
      background: var(--card-bg);
      border-radius: 12px;
      padding: 1.1rem;
      box-shadow: 0 12px 40px var(--card-shadow);
      z-index: 100;
      text-align: left;
    }
    .book-popup::after {
      content: '';
      position: absolute;
      top: 100%; left: 50%;
      transform: translateX(-50%);
      border: 8px solid transparent;
      border-top-color: var(--card-bg);
    }
    .book:hover .book-popup { display: block; }

    .book-popup-title {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 0.2rem;
      line-height: 1.3;
      writing-mode: horizontal-tb;
      text-orientation: initial;
    }
    .book-popup-author {
      font-size: 0.75rem;
      color: var(--text-sec);
      margin-bottom: 0.4rem;
      writing-mode: horizontal-tb;
    }
    .book-popup-desc {
      font-size: 0.72rem;
      color: var(--text-sec);
      line-height: 1.5;
      writing-mode: horizontal-tb;
    }
    .book-popup-tag {
      display: inline-block;
      font-size: 0.6rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 0.15em 0.5em;
      border-radius: 10px;
      margin-top: 0.4rem;
      writing-mode: horizontal-tb;
    }

    @media (max-width: 640px) {
      .page-header h1 { font-size: 1.8rem; }
      .book { width: 30px; }
      .book-spine { font-size: 0.5rem; }
      .book-popup { width: 220px; }
    }

    /* Text selection */
    ::selection { background: rgba(139, 94, 60, 0.25); color: var(--text); }
  </style>
</head>

<body>

  <nav class="r-nav">
    <a href="index.html"><i class="fas fa-arrow-left"></i> <span class="lang-en">Back</span><span class="lang-zh">返回</span></a>
    <span class="r-nav-title"><span class="lang-en">Bookshelf</span><span class="lang-zh">书架</span></span>
    <div class="r-nav-right"></div>
  </nav>

  <div class="bookshelf-page">
    <div class="page-header">
      <h1><span class="lang-en">My Bookshelf</span><span class="lang-zh">我的书架</span></h1>
      <p><span class="lang-en">Books that shaped my thinking — hover to explore</span><span class="lang-zh">塑造了我思想的书籍 — 悬停探索</span></p>
    </div>

    <div id="shelves"></div>
  </div>

  <script>
    /* ── Preferences ── */
    if (localStorage.getItem('darkMode') === 'true') document.body.classList.add('dark-mode');
    if (localStorage.getItem('lang') === 'zh') { document.body.classList.add('zh'); document.documentElement.lang = 'zh'; }
    const isZh = document.body.classList.contains('zh');

    /* ── Book data ──
       Each book: { title, author, desc, category, color, height (px) }
       To add books: add an entry to the appropriate category array.
       color: any CSS color for the spine. height: 110-160 recommended. */
    const books = {
      'Computer Science': [
        { title: 'Deep Learning', author: 'Goodfellow, Bengio, Courville', desc: 'The definitive textbook on deep neural networks, covering theory and practice.', color: '#2c3e50', height: 150 },
        { title: 'CLRS: Introduction to Algorithms', author: 'Cormen, Leiserson, Rivest, Stein', desc: 'The bible of algorithms — comprehensive and rigorous.', color: '#8e44ad', height: 155 },
        { title: 'Artificial Intelligence: A Modern Approach', author: 'Russell & Norvig', desc: 'The leading textbook in AI, covering search, logic, learning, and more.', color: '#2980b9', height: 148 },
        { title: 'Speech and Language Processing', author: 'Jurafsky & Martin', desc: 'The standard NLP textbook covering computational linguistics and language technology.', color: '#16a085', height: 145 },
        { title: 'Pattern Recognition and Machine Learning', author: 'Christopher Bishop', desc: 'A comprehensive introduction to the fields of pattern recognition and machine learning.', color: '#e74c3c', height: 140 },
        { title: 'The Elements of Statistical Learning', author: 'Hastie, Tibshirani, Friedman', desc: 'A classic on statistical learning from the Stanford statistics department.', color: '#2c3e50', height: 138 },
        { title: 'Mining of Massive Datasets', author: 'Leskovec, Rajaraman, Ullman', desc: 'Algorithms for big data — MapReduce, similarity search, and recommendation systems.', color: '#d35400', height: 135 },
        { title: 'Clean Code', author: 'Robert C. Martin', desc: 'A handbook of agile software craftsmanship — how to write readable, maintainable code.', color: '#27ae60', height: 130 },
      ],
      'Science': [
        { title: 'A Brief History of Time', author: 'Stephen Hawking', desc: 'From the Big Bang to black holes — a journey through cosmology for everyone.', color: '#1a1a2e', height: 130 },
        { title: 'The Selfish Gene', author: 'Richard Dawkins', desc: 'A gene-centered view of evolution that changed how we think about natural selection.', color: '#c0392b', height: 135 },
        { title: 'Sapiens', author: 'Yuval Noah Harari', desc: 'A sweeping history of humankind from the Stone Age to the Silicon Age.', color: '#e67e22', height: 142 },
        { title: 'Cosmos', author: 'Carl Sagan', desc: 'A poetic voyage through the universe, celebrating science and human curiosity.', color: '#0c2461', height: 138 },
        { title: 'The Structure of Scientific Revolutions', author: 'Thomas Kuhn', desc: 'How paradigm shifts transform our understanding — coined the term "paradigm shift."', color: '#6c5ce7', height: 125 },
        { title: 'Thinking, Fast and Slow', author: 'Daniel Kahneman', desc: 'Two systems of thought — and the cognitive biases that shape our decisions.', color: '#f39c12', height: 140 },
      ],
      'Fiction': [
        { title: 'The Three-Body Problem', author: 'Liu Cixin', desc: 'Hard sci-fi masterpiece — first contact set against the Cultural Revolution.', color: '#2d3436', height: 145 },
        { title: '1984', author: 'George Orwell', desc: 'A chilling vision of totalitarian surveillance that remains terrifyingly relevant.', color: '#636e72', height: 130 },
        { title: 'One Hundred Years of Solitude', author: 'Gabriel García Márquez', desc: 'Magical realism at its finest — the epic saga of the Buendía family.', color: '#d4a574', height: 140 },
        { title: 'Brave New World', author: 'Aldous Huxley', desc: 'A dystopia of engineered happiness — what if pleasure replaced freedom?', color: '#00b894', height: 128 },
        { title: 'The Hitchhiker\'s Guide to the Galaxy', author: 'Douglas Adams', desc: 'The answer is 42. A hilarious journey through the absurdity of the universe.', color: '#0984e3', height: 132 },
        { title: 'Dune', author: 'Frank Herbert', desc: 'Political intrigue, ecology, and religion on a desert planet. Sci-fi at its deepest.', color: '#b8860b', height: 150 },
      ],
      'Philosophy': [
        { title: 'Meditations', author: 'Marcus Aurelius', desc: 'A Roman emperor\'s private journal on Stoic philosophy — timeless wisdom on resilience.', color: '#795548', height: 118 },
        { title: 'The Republic', author: 'Plato', desc: 'Justice, the ideal state, and the allegory of the cave — foundational Western philosophy.', color: '#4a6fa5', height: 135 },
        { title: 'Tao Te Ching', author: 'Laozi', desc: 'Ancient Chinese wisdom on the Way — simplicity, humility, and harmony with nature.', color: '#2d5a27', height: 112 },
        { title: 'The Art of War', author: 'Sun Tzu', desc: 'Strategy, tactics, and the philosophy of conflict — still studied in business and military.', color: '#c0392b', height: 115 },
        { title: 'Beyond Good and Evil', author: 'Friedrich Nietzsche', desc: 'A critique of traditional morality and the pursuit of truth beyond conventional values.', color: '#2c2c54', height: 128 },
      ],
      'History & Society': [
        { title: 'Guns, Germs, and Steel', author: 'Jared Diamond', desc: 'Why did some civilizations conquer others? Geography, agriculture, and luck.', color: '#8B4513', height: 145 },
        { title: 'The Silk Roads', author: 'Peter Frankopan', desc: 'A new history of the world — from the perspective of the routes that connected East and West.', color: '#DAA520', height: 140 },
        { title: 'Educated', author: 'Tara Westover', desc: 'A memoir of growing up in a survivalist family and discovering the power of education.', color: '#5f27cd', height: 132 },
        { title: 'The Diary of a Young Girl', author: 'Anne Frank', desc: 'A Jewish girl\'s diary during the Holocaust — intimate, heartbreaking, and enduring.', color: '#eb4d4b', height: 125 },
        { title: 'Born a Crime', author: 'Trevor Noah', desc: 'Growing up mixed-race in apartheid South Africa — funny, moving, and eye-opening.', color: '#10ac84', height: 130 },
      ],
      'Self-Improvement': [
        { title: 'Atomic Habits', author: 'James Clear', desc: 'Small changes, remarkable results — the science of building good habits.', color: '#f9ca24', height: 130 },
        { title: 'Deep Work', author: 'Cal Newport', desc: 'The ability to focus deeply is becoming rare and valuable. How to cultivate it.', color: '#130f40', height: 128 },
        { title: 'The Subtle Art of Not Giving a F*ck', author: 'Mark Manson', desc: 'A counterintuitive approach to living a good life — choose your struggles wisely.', color: '#e55039', height: 132 },
        { title: 'Mindset', author: 'Carol Dweck', desc: 'Fixed vs. growth mindset — how your beliefs about ability shape your success.', color: '#4834d4', height: 126 },
      ],
    };

    /* ── Render shelves ── */
    const shelvesEl = document.getElementById('shelves');

    Object.entries(books).forEach(([category, bookList]) => {
      const section = document.createElement('div');
      section.className = 'shelf-section';

      // Category label
      const label = document.createElement('div');
      label.className = 'shelf-label';
      label.textContent = category;
      section.appendChild(label);

      // Shelf background (wall + books)
      const shelf = document.createElement('div');
      shelf.className = 'shelf';

      bookList.forEach(book => {
        const bookEl = document.createElement('div');
        bookEl.className = 'book';
        bookEl.style.height = book.height + 'px';
        bookEl.style.background = `linear-gradient(135deg, ${book.color} 0%, ${adjustColor(book.color, -20)} 100%)`;

        // Spine text
        const spine = document.createElement('div');
        spine.className = 'book-spine';
        spine.textContent = book.title;
        bookEl.appendChild(spine);

        // Hover popup
        const popup = document.createElement('div');
        popup.className = 'book-popup';
        popup.innerHTML = `
          <div class="book-popup-title">${book.title}</div>
          <div class="book-popup-author">${book.author}</div>
          <div class="book-popup-desc">${isZh ? book.desc : book.desc}</div>
          <span class="book-popup-tag" style="background: ${book.color}20; color: ${book.color};">${category}</span>
        `;
        bookEl.appendChild(popup);

        shelf.appendChild(bookEl);
      });

      section.appendChild(shelf);

      // Wooden plank
      const plank = document.createElement('div');
      plank.className = 'shelf-plank';
      section.appendChild(plank);

      shelvesEl.appendChild(section);
    });

    /* ── Darken/lighten a hex color ── */
    function adjustColor(hex, amount) {
      hex = hex.replace('#', '');
      if (hex.length === 3) hex = hex.split('').map(c => c + c).join('');
      const num = parseInt(hex, 16);
      let r = Math.min(255, Math.max(0, (num >> 16) + amount));
      let g = Math.min(255, Math.max(0, ((num >> 8) & 0x00FF) + amount));
      let b = Math.min(255, Math.max(0, (num & 0x0000FF) + amount));
      return '#' + (r << 16 | g << 8 | b).toString(16).padStart(6, '0');
    }
  </script>

</body>
</html>
